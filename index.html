<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floating VAPI Voice Bot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f8f8f8;
            padding-top: 40px;
        }

        h1 {
            color: #333;
        }

        /* Floating Voice Button */
        #voiceWidget {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 70px;
            height: 70px;
            background: #0078ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.25);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        #voiceWidget:hover {
            transform: scale(1.1);
            background: #005fcc;
        }
    </style>
</head>

<body>

    <h1>🎤 Floating Voice Assistant</h1>
    <p>Tap the floating button at the bottom-right to start the bot.</p>

    <!-- Floating Voice Bot Widget -->
    <div id="voiceWidget">🎤</div>

    <!-- Load VAPI SDK -->
    <script src="https://cdn.vapi.ai/vapi.js"></script>

    <script>
        const assistantId = "48924dff-3df4-4c1c-8588-a13a6ba2dea6";

        window.vapi.onReady(() => {
            console.log("VAPI Ready");

            // UPDATED CLICK HANDLER WITH FORCED MICROPHONE PERMISSION
            document.getElementById("voiceWidget").onclick = async () => {
                try {
                    // Force mic permission popup
                    await navigator.mediaDevices.getUserMedia({ audio: true });

                    console.log("Mic permission granted. Starting bot...");

                    // Start VAPI bot
                    window.vapi.start({
                        assistantId: assistantId,
                        startMuted: false
                    });

                } catch (err) {
                    console.error("Mic blocked:", err);
                    alert("Microphone access is required. Please allow it.");
                }
            };
        });
    </script>

</body>
</html>
